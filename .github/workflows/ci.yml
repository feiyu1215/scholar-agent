name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint v2 source
        run: ruff check v2/ --select=F401,F811 --ignore=E501 --exit-zero
      - name: Check syntax (compileall)
        run: python -m compileall v2/ -q
      - name: Verify core modules parse (AST)
        run: cd v2 && python ../.github/scripts/check_syntax.py

  import-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r v2/requirements.txt
      - name: Verify all core modules import cleanly
        run: cd v2 && python ../.github/scripts/check_imports.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  test:
    runs-on: ubuntu-latest
    needs: import-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r v2/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run unit tests
        run: |
          cd v2 && pytest tests/ -m "not e2e" --tb=short -q; rc=$?
          # exit 5 = no tests collected (acceptable while test suite is being built)
          # exit 0 = all passed; any other code = real failure
          if [ $rc -eq 5 ] || [ $rc -eq 0 ]; then exit 0; else exit $rc; fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: import-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r v2/requirements.txt
      - name: Smoke test — agent init + config integrity
        run: cd v2 && python ../.github/scripts/smoke_test.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scholar-agent:ci-test .
      - name: Verify Docker image runs
        run: docker run --rm scholar-agent:ci-test --help
