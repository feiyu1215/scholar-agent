name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint v2 source
        run: ruff check v2/ --select=F401,F811 --ignore=E501 --exit-zero
      - name: Check syntax (compileall)
        run: python -m compileall v2/ -q
      - name: Verify core modules parse (AST)
        run: cd v2 && python ../.github/scripts/check_syntax.py

  import-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r v2/requirements.txt
      - name: Verify all core modules import cleanly
        run: cd v2 && python ../.github/scripts/check_imports.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  test:
    runs-on: ubuntu-latest
    needs: import-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r v2/requirements.txt
          pip install "pytest>=7.0,<9.0" "pytest-asyncio>=0.23,<1.0" pdfplumber pyyaml
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          cd v2
          python -m pytest tests/ -m "not e2e" --tb=short -q 2>&1 | tee /tmp/pytest_out.txt; rc=${PIPESTATUS[0]}
          if [ $rc -eq 5 ] || [ $rc -eq 0 ]; then exit 0; fi
          echo "::error::pytest failed with exit code $rc"
          tail -80 /tmp/pytest_out.txt
          exit $rc
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: import-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r v2/requirements.txt
      - name: Smoke test — agent init + config integrity
        run: cd v2 && python ../.github/scripts/smoke_test.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-placeholder' }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scholar-agent:ci-test .
      - name: Verify Docker image runs
        run: docker run --rm scholar-agent:ci-test --help
